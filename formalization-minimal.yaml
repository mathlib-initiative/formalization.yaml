# formalization.yaml (v0.3 minimal): repo-root metadata for formalization projects.
# Only the required fields are shown. Every field below should be present and filled.

version: "v0.3"                # [required]

# project - the formalization itself (not the source).
project:                       # [required]
  name: ""                     # [required]
  authors: []                  # [required] who did the formalization
  license: ""                  # [required]

# sources - what was formalized. List of papers/textbooks/blueprints/etc.
sources:                       # [required] list of sources
  - title: ""                  # [required]
    authors: []                # [required]
    id: ""                     # [required] link, DOI, or arXiv ID (with version)

# how it was produced. One entry per distinct phase/run/tool.
automation:                    # [required]
  methods:                     # [required] one entry per distinct phase/run/tool
    - method: ""               # [required] manual | copilot | agent | autonomous | other

# review status
review:                        # [required]
  status: ""                   # [required] unchecked | agent-reviewed | self-assessed | peer-reviewed | author-verified | other/freeform
